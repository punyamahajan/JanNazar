<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Civic dome/building silhouette -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#g1)"/>
  <!-- Dome -->
  <ellipse cx="24" cy="18" rx="10" ry="7" fill="white" opacity="0.95"/>
  <!-- Building body -->
  <rect x="14" y="18" width="20" height="16" fill="white" opacity="0.95"/>
  <!-- Columns -->
  <rect x="16" y="20" width="3" height="12" rx="1" fill="url(#g1)" opacity="0.7"/>
  <rect x="22.5" y="20" width="3" height="12" rx="1" fill="url(#g1)" opacity="0.7"/>
  <rect x="29" y="20" width="3" height="12" rx="1" fill="url(#g1)" opacity="0.7"/>
  <!-- Steps -->
  <rect x="11" y="34" width="26" height="3" rx="1" fill="white" opacity="0.95"/>
  <rect x="8" y="37" width="32" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <!-- Flag pole and dot (eye / nazar) -->
  <circle cx="24" cy="10" r="3" fill="white" opacity="0.9"/>
  <circle cx="24" cy="10" r="1.5" fill="url(#g1)"/>
</svg>
